<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 250px; padding: 15px; font-family: sans-serif; background: #141414; color: white; }
  input, button { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 8px; }
  button { background: #e50914; color: white; border: none; cursor: pointer; font-weight: bold; }
  .hidden { display: none; }
  #statusPanel { text-align: center; }
  .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
  .connected { background-color: #4CAF50; }
  /* New History Styles */
  .history-item { cursor: pointer; color: #b3b3b3; font-size: 12px; margin-top: 5px; padding: 6px; background: #333; border-radius: 3px; text-align: center; }
  .history-item:hover { color: white; background: #444; }
</style>
</head>
<body>

  <div id="connectPanel">
    <h4 style="margin-top:0;">Connect to Partner</h4>
    <input type="text" id="ipInput" placeholder="Tailscale IP">
    <button id="connectBtn">Connect & Start</button>
    <div id="historyContainer" style="margin-top: 15px;"></div>
  </div>
  
  <div id="statusPanel" class="hidden">
    <h4 style="margin-top:0;">Session Active</h4>
    <div style="margin: 15px 0;">
      <span class="status-dot connected"></span> 
      <span id="statusText">Working</span>
    </div>
    <button id="disconnectBtn" style="background: #333;">Disconnect</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
